name: Windows RDP Testing
on: 
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  rdp-test:
    runs-on: windows-latest
    timeout-minutes: 360 # Max 6 hours
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
    steps:
      - name: Set Screen Resolution to 1920x1080
        run: |
          try {
            Set-DisplayResolution -Width 1920 -Height 1080 -Force
            Write-Host "✅ Resolution set to 1920x1080"
          } catch {
            Write-Host "⚠️ Set-DisplayResolution failed, trying registry method..."
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Video\*\0000" -Name "DefaultSettings.XResolution" -Value 1920 -PropertyType DWord -Force -ErrorAction SilentlyContinue
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Video\*\0000" -Name "DefaultSettings.YResolution" -Value 1080 -PropertyType DWord -Force -ErrorAction SilentlyContinue
            Write-Host "Registry updated (resolution may apply after VNC starts)"
          }

      - name: Install TightVNC Server
        run: |
          choco install tightvnc -y --install-arguments '"/quiet /norestart ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_USEVNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=tester123 SET_USECONTROLAUTHENTICATION=1 VALUE_OF_USECONTROLAUTHENTICATION=1 SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=tester123 SET_ALLOWLOOPBACK=1 VALUE_OF_ALLOWLOOPBACK=1"'

      - name: Setup Python websockify & Download noVNC
        run: |
          pip install websockify

          # Download noVNC (the browser-based VNC client)
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "novnc.zip"
          Expand-Archive -Path "novnc.zip" -DestinationPath "."
          Rename-Item -Path "noVNC-1.5.0" -NewName "noVNC"

          # Create a simple redirect so opening the root URL goes straight to the VNC viewer
          Set-Content -Path "noVNC\index.html" -Value '<html><head><meta http-equiv="refresh" content="0;url=vnc.html?autoconnect=true&resize=remote&password=tester123"></head></html>'

      - name: Install & Configure ngrok
        run: |
          choco install ngrok -y
          ngrok config add-authtoken $env:NGROK_AUTH_TOKEN

      - name: Start noVNC & ngrok Tunnel
        run: |
          # Start websockify (bridges browser websockets to VNC on port 5900)
          Start-Process -FilePath "python" -ArgumentList "-m websockify --web=.\noVNC 6080 localhost:5900" -WindowStyle Hidden
          Start-Sleep -Seconds 3

          # Verify websockify is running
          $ws = Get-NetTCPConnection -LocalPort 6080 -ErrorAction SilentlyContinue
          if (-not $ws) {
            Write-Host "❌ websockify failed to start!"
            exit 1
          }
          Write-Host "✅ websockify is running on port 6080"

          # Start ngrok HTTP tunnel (free tier supports HTTP, just not TCP)
          Start-Process -FilePath "ngrok" -ArgumentList "http 6080 --log stdout" -RedirectStandardOutput "ngrok.log" -RedirectStandardError "ngrok.err" -WindowStyle Hidden
          
          # Wait for ngrok to start and grab the URL from its local API
          Write-Host "Waiting for ngrok tunnel..."
          $tunnelUrl = $null
          for ($i = 1; $i -le 20; $i++) {
            Start-Sleep -Seconds 2
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:4040/api/tunnels" -UseBasicParsing -ErrorAction Stop
              $json = $response.Content | ConvertFrom-Json
              $tunnelUrl = $json.tunnels[0].public_url
              if ($tunnelUrl) { break }
            } catch {
              Write-Host "  Attempt $i/20 - ngrok not ready yet..."
            }
          }

          if (-not $tunnelUrl) {
            Write-Host "❌ Failed to start ngrok! Here are the logs:"
            Write-Host "---- STDOUT ----"
            if (Test-Path "ngrok.log") { Get-Content "ngrok.log" }
            Write-Host "---- STDERR ----"
            if (Test-Path "ngrok.err") { Get-Content "ngrok.err" }
            exit 1
          }

          Write-Host ""
          Write-Host "======================================================="
          Write-Host "✅ READY TO CONNECT!"
          Write-Host ""
          Write-Host "🌐 Open this URL in your browser:"
          Write-Host "   $tunnelUrl"
          Write-Host ""
          Write-Host "   That's it! You'll see the Windows desktop right in"
          Write-Host "   your browser. No extra software needed."
          Write-Host ""
          Write-Host "   VNC Password (if prompted): tester123"
          Write-Host "======================================================="

          Write-Host ""
          Write-Host "Keeping the runner alive... (Cancel the workflow manually when done)"
          while ($true) { Start-Sleep -Seconds 60 }
