name: Windows RDP Testing
on: 
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  rdp-test:
    runs-on: windows-latest
    timeout-minutes: 360 # Max 6 hours
    steps:
      - name: Install TightVNC Server
        run: |
          choco install tightvnc -y --install-arguments '"/quiet /norestart ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_USEVNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=tester123 SET_USECONTROLAUTHENTICATION=1 VALUE_OF_USECONTROLAUTHENTICATION=1 SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=tester123"'

      - name: Setup Python websockify & Download noVNC
        run: |
          pip install websockify

          # Download noVNC (the browser-based VNC client)
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "novnc.zip"
          Expand-Archive -Path "novnc.zip" -DestinationPath "."
          Rename-Item -Path "noVNC-1.5.0" -NewName "noVNC"

          # Create a simple redirect so opening the root URL goes straight to the VNC viewer
          Set-Content -Path "noVNC\index.html" -Value '<html><head><meta http-equiv="refresh" content="0;url=vnc.html?autoconnect=true&resize=remote&password=tester123"></head></html>'

      - name: Download cloudflared
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"

      - name: Start noVNC & Cloudflare Tunnel
        run: |
          # Start websockify (bridges browser websockets to VNC on port 5900)
          # --web serves the noVNC HTML files on the same port
          Start-Process -FilePath "python" -ArgumentList "-m websockify --web=.\noVNC 6080 localhost:5900" -WindowStyle Hidden
          Start-Sleep -Seconds 3

          # Verify websockify is running
          $ws = Get-NetTCPConnection -LocalPort 6080 -ErrorAction SilentlyContinue
          if (-not $ws) {
            Write-Host "❌ websockify failed to start!"
            exit 1
          }
          Write-Host "✅ websockify is running on port 6080"

          # Start cloudflared tunnel pointing to the noVNC HTTP server
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:6080" -RedirectStandardOutput "cf_stdout.log" -RedirectStandardError "cf_stderr.log" -WindowStyle Hidden

          # Wait for the tunnel URL
          Write-Host "Waiting for Cloudflare Tunnel to start..."
          $tunnelUrl = $null
          for ($i = 1; $i -le 30; $i++) {
            Start-Sleep -Seconds 2
            if (Test-Path "cf_stderr.log") {
              $logContent = Get-Content "cf_stderr.log" -Raw
              if ($logContent -match "(https://[a-zA-Z0-9\-]+\.trycloudflare\.com)") {
                $tunnelUrl = $matches[1]
                break
              }
            }
          }

          if (-not $tunnelUrl) {
            Write-Host "❌ Failed to start Cloudflare Tunnel! Here are the logs:"
            Write-Host "---- STDOUT ----"
            if (Test-Path "cf_stdout.log") { Get-Content "cf_stdout.log" }
            Write-Host "---- STDERR ----"
            if (Test-Path "cf_stderr.log") { Get-Content "cf_stderr.log" }
            exit 1
          }

          Write-Host "======================================================="
          Write-Host "✅ READY TO CONNECT!"
          Write-Host ""
          Write-Host "🌐 Open this URL in your browser:"
          Write-Host "   $tunnelUrl"
          Write-Host ""
          Write-Host "   That's it! You'll see the Windows desktop right in"
          Write-Host "   your browser. No extra software needed."
          Write-Host ""
          Write-Host "   VNC Password (if prompted): tester123"
          Write-Host "======================================================="

          Write-Host ""
          Write-Host "Keeping the runner alive... (Cancel the workflow manually when done)"
          while ($true) { Start-Sleep -Seconds 60 }
