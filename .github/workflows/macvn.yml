name: macOS Remote Desktop (VNC)

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: "VNC password (max 8 chars)"
        required: true
        default: "remoteme"
      session_timeout:
        description: "Max session time in minutes"
        required: true
        default: "30"

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.session_timeout) }}

    steps:
      - name: System Info
        run: |
          echo "🖥️  $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "🏗️  $(uname -m)"
          echo "👤  $(whoami)"
          echo "📂  $(pwd)"

      - name: Wake display & prevent sleep
        run: |
          # Prevent the system and display from sleeping
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0

          # Disable screensaver
          defaults write com.apple.screensaver idleTime 0
          defaults write com.apple.screensaver askForPassword 0

          # Start caffeinate to keep system awake for the entire session
          caffeinate -disu &
          echo $! > /tmp/caffeinate.pid

          # Wake the display by simulating user activity
          caffeinate -u -t 5 &

          # Disable screen lock
          sysadminctl -screenLock off 2>/dev/null || true

          echo "✅ Display awake, sleep disabled"

      - name: Enable VNC (Screen Sharing)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ github.event.inputs.vnc_password }}" \
            -restart -agent -privs -all
          echo "✅ VNC server enabled on port 5900"

      - name: Force desktop session
        run: |
          # Simulate mouse movement to trigger desktop rendering
          osascript -e 'tell application "Finder" to activate'
          sleep 2
          osascript -e 'tell application "System Events" to key code 53'
          sleep 1

          # Open a Finder window so there's something visible
          osascript -e 'tell application "Finder"
            make new Finder window
            set bounds of front Finder window to {100, 100, 800, 600}
          end tell'

          # Verify WindowServer is running
          if pgrep -x WindowServer > /dev/null; then
            echo "✅ WindowServer is running"
          else
            echo "⚠️ WindowServer not found"
          fi

          # Log display info
          system_profiler SPDisplaysDataType 2>/dev/null | head -20 || true
          echo "✅ Desktop session forced active"

      - name: Install bore tunnel
        run: |
          # Download bore (free, no account needed, no credit card)
          BORE_URL=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest \
            | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)['assets']
          for a in assets:
              name = a['name']
              if 'apple-darwin' in name and ('aarch64' in name or 'x86_64' in name):
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $BORE_URL"
          curl -sL "$BORE_URL" | tar xz
          chmod +x bore
          sudo mv bore /usr/local/bin/bore
          bore --version

      - name: Start VNC tunnel
        run: |
          # Start bore tunnel in background, capture output
          bore local 5900 --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!
          sleep 5

          # Parse the assigned port from bore output
          cat /tmp/bore.log
          BORE_PORT=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1 | cut -d: -f2)

          if [ -z "$BORE_PORT" ]; then
            echo "❌ Failed to get bore tunnel port. Log output:"
            cat /tmp/bore.log
            exit 1
          fi

          echo ""
          echo "============================================"
          echo "🚀 VNC REMOTE DESKTOP READY"
          echo "============================================"
          echo ""
          echo "  Connect with any VNC client to:"
          echo ""
          echo "    bore.pub:${BORE_PORT}"
          echo ""
          echo "  Password: (the one you set in workflow input)"
          echo ""
          echo "  Recommended VNC clients:"
          echo "    • macOS:   built-in Screen Sharing app"
          echo "               (Finder → Go → Connect to Server)"
          echo "               vnc://bore.pub:${BORE_PORT}"
          echo "    • Windows: RealVNC Viewer, TightVNC"
          echo "    • Linux:   Remmina, TigerVNC"
          echo "    • iOS/Android: RealVNC Viewer"
          echo ""
          echo "  Session timeout: ${{ github.event.inputs.session_timeout }} min"
          echo "============================================"

      - name: Keep alive until timeout
        run: |
          echo "⏳ Session active. Auto-terminates in ${{ github.event.inputs.session_timeout }} min."
          echo "   Cancel the workflow manually when you're done."
          echo ""
          TIMEOUT=$(( ${{ github.event.inputs.session_timeout }} * 60 ))
          ELAPSED=0
          INTERVAL=60
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            REMAINING=$(( (TIMEOUT - ELAPSED) / 60 ))
            echo "⏱️  ${REMAINING} min remaining..."
          done
          echo "🛑 Session timed out."
