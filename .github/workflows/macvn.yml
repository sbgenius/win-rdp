name: SSH Debug - macOS Runner

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Timeout duration in minutes for the SSH session'
        required: false
        default: '30'

jobs:
  ssh-debug:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH session via tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        timeout-minutes: ${{ fromJSON(github.event.inputs.duration || '30') }}
