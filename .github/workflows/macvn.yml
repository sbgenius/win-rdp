name: SSH Debug macOS Runner

on:
  workflow_dispatch:
    inputs:
      limit-access-to-actor:
        description: 'Limit SSH access to the workflow triggering actor'
        required: false
        type: boolean
        default: true

jobs:
  ssh-debug:
    runs-on: macos-latest
    timeout-minutes: 60  # tmate session will hold the runner open, so cap it

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # (Optional) run your normal build/test steps here first
      # - name: Build
      #   run: ...

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: ${{ inputs.limit-access-to-actor }}
        timeout-minutes: 30
