name: macOS Remote Desktop (VNC)

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: "VNC password (max 8 chars)"
        required: true
        default: "remoteme"
      session_timeout:
        description: "Max session time in minutes"
        required: true
        default: "30"

permissions:
  contents: write

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.session_timeout) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: "[DIAG] System info"
        run: |
          echo "=== OS ==="
          sw_vers
          echo ""
          echo "=== Architecture ==="
          uname -a
          echo ""
          echo "=== User ==="
          whoami
          id
          echo ""
          echo "=== SIP Status ==="
          csrutil status 2>&1 || true
          echo ""
          echo "=== Current GUI session user ==="
          stat -f '%Su' /dev/console 2>/dev/null || echo "N/A"
          echo ""
          echo "=== Login window settings ==="
          sudo defaults read /Library/Preferences/com.apple.loginwindow 2>/dev/null || echo "N/A"

      - name: "[DIAG] Display & WindowServer (BEFORE)"
        run: |
          echo "=== WindowServer process ==="
          ps aux | grep -i windowserver | grep -v grep || echo "NOT RUNNING"
          echo ""
          echo "=== Display info ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "N/A"
          echo ""
          echo "=== CGSession ==="
          python3 -c "
          try:
              import Quartz
              d = Quartz.CGSessionCopyCurrentDictionary()
              if d:
                  for k in sorted(d):
                      print(f'  {k} = {d[k]}')
              else:
                  print('  CGSessionCopyCurrentDictionary returned None')
          except Exception as e:
              print(f'  Error: {e}')
          "
          echo ""
          echo "=== Quartz display list ==="
          python3 -c "
          try:
              import Quartz
              err, ids, cnt = Quartz.CGGetActiveDisplayList(10, None, None)
              print(f'  Error code: {err}')
              print(f'  Active display count: {cnt}')
              if ids:
                  for d in ids:
                      b = Quartz.CGDisplayBounds(d)
                      print(f'  Display {d}: {int(b.size.width)}x{int(b.size.height)} at ({int(b.origin.x)},{int(b.origin.y)})')
                      print(f'    Online: {Quartz.CGDisplayIsOnline(d)}')
                      print(f'    Active: {Quartz.CGDisplayIsActive(d)}')
                      print(f'    Asleep: {Quartz.CGDisplayIsAsleep(d)}')
                      print(f'    Main: {Quartz.CGDisplayIsMain(d)}')
          except Exception as e:
              print(f'  Error: {e}')
          "
          echo ""
          echo "=== Power management settings ==="
          pmset -g 2>/dev/null || true
          echo ""
          echo "=== Screen capture test (BEFORE VNC) ==="
          screencapture -x /tmp/screen_before.png 2>&1 || echo "screencapture failed"
          if [ -f /tmp/screen_before.png ]; then
            ls -la /tmp/screen_before.png
            file /tmp/screen_before.png
          fi

      - name: Prevent sleep
        run: |
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0 hibernatemode 0
          defaults write com.apple.screensaver idleTime 0
          defaults write com.apple.screensaver askForPassword 0
          caffeinate -disu &
          caffeinate -u -t 10 &
          echo "✅ Sleep disabled"

      - name: Set display resolution to 1920x1080
        run: |
          brew install displayplacer 2>&1 || true
          echo "=== Current display config ==="
          displayplacer list 2>&1 || true
          echo ""
          echo "=== Setting resolution to 1920x1080 ==="
          displayplacer "id:1 res:1920x1080 scaling:on" 2>&1 || \
          displayplacer "id:1 res:1920x1080 scaling:off" 2>&1 || \
          displayplacer "id:1 mode:1920x1080" 2>&1 || true
          sleep 2
          echo "=== New display config ==="
          displayplacer list 2>&1 || true
          echo "✅ Resolution set"

      - name: Configure ARD/VNC preferences
        run: |
          echo "=== Setting VNC preferences ==="

          # Force VNC to use the console (real) session
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true
          echo "  VNCAlwaysStartOnConsole = true"

          # Disable curtain (prevents intentional black screen)
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement dontCurtainDuringObservation -bool true
          echo "  dontCurtainDuringObservation = true"

          # Auto-login
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser "$(whoami)"
          echo "  autoLoginUser = $(whoami)"

          # Disable screen lock
          sysadminctl -screenLock off 2>/dev/null || true

          echo ""
          echo "=== Verify all RemoteManagement prefs ==="
          sudo defaults read /Library/Preferences/com.apple.RemoteManagement 2>/dev/null || echo "N/A"

      - name: Enable VNC (Screen Sharing)
        run: |
          echo "=== Kickstart ARD ==="
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ github.event.inputs.vnc_password }}" \
            -restart -agent -privs -all 2>&1
          echo ""

          echo "=== Restart agent after pref changes ==="
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent 2>&1
          sleep 3
          echo ""

          echo "=== Verify VNC is listening ==="
          lsof -i :5900 2>/dev/null || echo "⚠️ Nothing on port 5900"
          echo ""
          netstat -an | grep 5900 || echo "⚠️ netstat shows nothing on 5900"

      - name: "[DIAG] Display & WindowServer (AFTER VNC)"
        run: |
          echo "=== WindowServer process ==="
          ps aux | grep -i windowserver | grep -v grep || echo "NOT RUNNING"
          echo ""
          echo "=== ARDAgent process ==="
          ps aux | grep -i ARDAgent | grep -v grep || echo "NOT RUNNING"
          echo ""
          echo "=== screensharingd process ==="
          ps aux | grep -i screensharing | grep -v grep || echo "NOT RUNNING"
          echo ""
          echo "=== All relevant processes ==="
          ps aux | grep -iE '(vnc|ard|screensharing|windowserver|loginwindow|Finder)' | grep -v grep || true
          echo ""
          echo "=== Quartz display list (AFTER) ==="
          python3 -c "
          try:
              import Quartz
              err, ids, cnt = Quartz.CGGetActiveDisplayList(10, None, None)
              print(f'  Error code: {err}')
              print(f'  Active display count: {cnt}')
              if ids:
                  for d in ids:
                      b = Quartz.CGDisplayBounds(d)
                      print(f'  Display {d}: {int(b.size.width)}x{int(b.size.height)} at ({int(b.origin.x)},{int(b.origin.y)})')
                      print(f'    Online: {Quartz.CGDisplayIsOnline(d)}')
                      print(f'    Active: {Quartz.CGDisplayIsActive(d)}')
                      print(f'    Asleep: {Quartz.CGDisplayIsAsleep(d)}')
          except Exception as e:
              print(f'  Error: {e}')
          "
          echo ""
          echo "=== CGSession (AFTER) ==="
          python3 -c "
          try:
              import Quartz
              d = Quartz.CGSessionCopyCurrentDictionary()
              if d:
                  for k in sorted(d):
                      print(f'  {k} = {d[k]}')
              else:
                  print('  CGSessionCopyCurrentDictionary returned None')
          except Exception as e:
              print(f'  Error: {e}')
          "

      - name: Force desktop to render
        run: |
          caffeinate -u -t 5
          osascript -e 'tell application "Finder" to activate' 2>&1 || true
          sleep 2
          osascript -e 'tell application "Finder"
            make new Finder window
            set bounds of front Finder window to {50, 50, 900, 600}
          end tell' 2>&1 || true
          sleep 1
          osascript -e 'tell application "TextEdit"
            activate
            make new document
            set text of front document to "GitHub Actions macOS Remote Desktop"
          end tell' 2>&1 || true
          sleep 1
          echo "✅ Finder + TextEdit launched"

      - name: Click Allow on TCC permission dialog
        run: |
          echo "=== Taking pre-click screenshot ==="
          screencapture -x /tmp/screen_before_click.png 2>&1 || true
          ls -la /tmp/screen_before_click.png 2>/dev/null || true

          echo ""
          echo "=== Method 1: AppleScript click button by name ==="
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            osascript -e '
              tell application "System Events"
                try
                  set procList to name of every application process
                  if "UserNotificationCenter" is in procList then
                    tell application process "UserNotificationCenter"
                      set frontmost to true
                      delay 0.5
                      try
                        click button "Allow" of window 1
                        log "Clicked Allow button"
                      end try
                      try
                        click button "OK" of window 1
                        log "Clicked OK button"
                      end try
                    end tell
                  else
                    log "UserNotificationCenter not running"
                  end if
                end try
              end tell
            ' 2>&1 || true
            sleep 2
          done

          echo ""
          echo "=== Method 2: cliclick at estimated coordinates ==="
          brew install cliclick 2>/dev/null || true
          if command -v cliclick &>/dev/null; then
            # Get screen size via osascript (no Python needed)
            SCREEN_SIZE=$(osascript -e 'tell application "Finder" to get bounds of window of desktop' 2>/dev/null || echo "0, 0, 1920, 1080")
            SCREEN_W=$(echo "$SCREEN_SIZE" | awk -F', ' '{print $3}')
            SCREEN_H=$(echo "$SCREEN_SIZE" | awk -F', ' '{print $4}')
            echo "Screen size: ${SCREEN_W}x${SCREEN_H}"

            # Scale Allow button position from original 1024x768 screenshot
            BTN_X=$((SCREEN_W * 510 / 1024))
            BTN_Y=$((SCREEN_H * 387 / 768))
            echo "Clicking at estimated position: ${BTN_X},${BTN_Y}"
            cliclick c:${BTN_X},${BTN_Y} 2>&1 || true

            # Also try nearby positions
            for dy in -20 -10 0 10 20; do
              for dx in -30 -15 0 15 30; do
                CX=$((BTN_X + dx))
                CY=$((BTN_Y + dy))
                cliclick c:${CX},${CY} 2>&1 || true
              done
            done
            echo "cliclick grid done"
          else
            echo "cliclick not available"
          fi

          sleep 2
          echo ""
          echo "=== Taking post-click screenshot ==="
          screencapture -x /tmp/screen_after_click.png 2>&1 || true
          ls -la /tmp/screen_after_click.png 2>/dev/null || true
          echo "✅ Click attempts completed"

      - name: "[DIAG] Screenshot test (AFTER desktop force)"
        run: |
          echo "=== Screenshot AFTER forcing desktop ==="
          screencapture -x /tmp/screen_after.png 2>&1 || echo "screencapture failed"
          if [ -f /tmp/screen_after.png ]; then
            ls -la /tmp/screen_after.png
            file /tmp/screen_after.png
            SIZE=$(stat -f%z /tmp/screen_after.png 2>/dev/null)
            echo "Size: ${SIZE} bytes"
            if [ "$SIZE" -gt 10000 ]; then
              echo "✅ Screenshot has real content (${SIZE} bytes)"
            elif [ "$SIZE" -gt 1000 ]; then
              echo "⚠️ Screenshot is small — might be a blank desktop"
            else
              echo "❌ Screenshot is tiny — likely a black/empty screen"
            fi
          else
            echo "❌ screencapture produced no file"
          fi

          echo ""
          echo "=== Trying python screenshot as fallback ==="
          python3 -c "
          try:
              import Quartz
              image = Quartz.CGWindowListCreateImage(
                  Quartz.CGRectInfinite,
                  Quartz.kCGWindowListOptionOnScreenOnly,
                  Quartz.kCGNullWindowID,
                  Quartz.kCGWindowImageDefault
              )
              if image:
                  w = Quartz.CGImageGetWidth(image)
                  h = Quartz.CGImageGetHeight(image)
                  bpp = Quartz.CGImageGetBitsPerPixel(image)
                  print(f'  CGWindowListCreateImage: {w}x{h} @ {bpp}bpp')
              else:
                  print('  CGWindowListCreateImage returned None')
          except Exception as e:
              print(f'  Error: {e}')
          "

          echo ""
          echo "=== List all on-screen windows ==="
          python3 -c "
          try:
              import Quartz
              windows = Quartz.CGWindowListCopyWindowInfo(
                  Quartz.kCGWindowListOptionOnScreenOnly,
                  Quartz.kCGNullWindowID
              )
              if windows:
                  print(f'  Total on-screen windows: {len(windows)}')
                  for w in windows[:20]:
                      name = w.get('kCGWindowOwnerName', '?')
                      wname = w.get('kCGWindowName', '')
                      layer = w.get('kCGWindowLayer', '?')
                      bounds = w.get('kCGWindowBounds', {})
                      bstr = f\"{bounds.get('Width', '?')}x{bounds.get('Height', '?')}\"
                      print(f'  [{layer}] {name}: \"{wname}\" ({bstr})')
              else:
                  print('  No windows found')
          except Exception as e:
              print(f'  Error: {e}')
          "

      - name: "[DIAG] VNC connection test"
        run: |
          echo "=== Testing VNC port locally ==="
          nc -z -w 3 127.0.0.1 5900 && echo "✅ Port 5900 is open" || echo "❌ Port 5900 is closed"
          echo ""
          echo "=== Reading VNC banner ==="
          echo "" | nc -w 3 127.0.0.1 5900 2>/dev/null | head -c 100 || echo "Could not read banner"
          echo ""
          echo ""
          echo "=== RemoteManagement plist (final) ==="
          sudo defaults read /Library/Preferences/com.apple.RemoteManagement 2>/dev/null || echo "N/A"

      - name: Install bore tunnel
        run: |
          BORE_URL=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest \
            | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)['assets']
          for a in assets:
              name = a['name']
              if 'apple-darwin' in name and ('aarch64' in name or 'x86_64' in name):
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $BORE_URL"
          curl -sL "$BORE_URL" | tar xz
          chmod +x bore
          sudo mv bore /usr/local/bin/bore
          bore --version

      - name: Start VNC tunnel
        run: |
          bore local 5900 --to bore.pub > /tmp/bore.log 2>&1 &
          sleep 5
          cat /tmp/bore.log
          BORE_PORT=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1 | cut -d: -f2)

          if [ -z "$BORE_PORT" ]; then
            echo "❌ Failed to get bore tunnel port:"
            cat /tmp/bore.log
            exit 1
          fi

          echo ""
          echo "============================================"
          echo "🚀 VNC REMOTE DESKTOP READY"
          echo "============================================"
          echo ""
          echo "    bore.pub:${BORE_PORT}"
          echo ""
          echo "    Password: (workflow input)"
          echo "============================================"

      - name: Capture debug screenshot and push to repo
        run: |
          echo "=== Taking screenshot ==="
          screencapture -x /tmp/debug_screenshot.png 2>&1 || true

          # Fallback: try python-based capture if screencapture gives nothing useful
          FILESIZE=$(stat -f%z /tmp/debug_screenshot.png 2>/dev/null || echo 0)
          if [ ! -f /tmp/debug_screenshot.png ] || [ "$FILESIZE" -lt 500 ]; then
            echo "screencapture failed or too small, trying python fallback..."
            python3 << 'PYEOF'
          import Quartz, os
          from Foundation import NSURL
          image = Quartz.CGWindowListCreateImage(
              Quartz.CGRectInfinite,
              Quartz.kCGWindowListOptionOnScreenOnly,
              Quartz.kCGNullWindowID,
              Quartz.kCGWindowImageDefault
          )
          if image:
              url = NSURL.fileURLWithPath_('/tmp/debug_screenshot.png')
              dest = Quartz.CGImageDestinationCreateWithURL(url, 'public.png', 1, None)
              if dest:
                  Quartz.CGImageDestinationAddImage(dest, image, None)
                  Quartz.CGImageDestinationFinalize(dest)
                  print('Python screenshot saved')
              else:
                  print('Failed to create image destination')
          else:
              print('CGWindowListCreateImage returned None')
          PYEOF
          fi

          if [ -f /tmp/debug_screenshot.png ]; then
            ls -la /tmp/debug_screenshot.png
            file /tmp/debug_screenshot.png
            cp /tmp/debug_screenshot.png ./debug_screenshot.png
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add debug_screenshot.png
            git commit -m "debug: VNC screenshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty || true
            git push || true
            echo "✅ Screenshot pushed to repo root as debug_screenshot.png"
          else
            echo "❌ No screenshot file was produced"
          fi

      - name: Keep alive until timeout
        run: |
          echo "⏳ Session active (${{ github.event.inputs.session_timeout }} min)."
          TIMEOUT=$(( ${{ github.event.inputs.session_timeout }} * 60 ))
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep 60
            ELAPSED=$((ELAPSED + 60))
            REMAINING=$(( (TIMEOUT - ELAPSED) / 60 ))
            echo "⏱️  ${REMAINING} min remaining..."
          done
          echo "🛑 Session timed out."
