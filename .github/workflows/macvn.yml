name: macOS Remote Desktop (VNC)

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: "VNC password (max 8 chars)"
        required: true
        default: "remoteme"
      session_timeout:
        description: "Max session time in minutes"
        required: true
        default: "30"

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.session_timeout) }}

    steps:
      - name: System Info
        run: |
          echo "🖥️  $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "🏗️  $(uname -m)"
          echo "👤  $(whoami)"
          echo "📂  $(pwd)"

      - name: Enable VNC (Screen Sharing)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ github.event.inputs.vnc_password }}" \
            -restart -agent -privs -all
          echo "✅ VNC server enabled on port 5900"

      - name: Install & start ngrok tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          brew install ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"
          ngrok tcp 5900 --log=stdout --log-format=json &
          sleep 5

          # Grab the public tunnel URL
          TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          tunnels = data.get('tunnels', [])
          if tunnels:
              print(tunnels[0]['public_url'])
          else:
              print('ERROR: No tunnels found')
              sys.exit(1)
          ")

          echo ""
          echo "============================================"
          echo "🚀 VNC REMOTE DESKTOP READY"
          echo "============================================"
          echo ""
          echo "  Connect with any VNC client to:"
          echo ""
          echo "    $TUNNEL_URL"
          echo ""
          echo "  Password: (the one you set in workflow input)"
          echo ""
          echo "  Recommended VNC clients:"
          echo "    • macOS:   built-in Screen Sharing app"
          echo "    • Windows: RealVNC Viewer, TightVNC"
          echo "    • Linux:   Remmina, TigerVNC"
          echo "    • iOS:     RealVNC Viewer"
          echo "    • Android: bVNC"
          echo ""
          echo "  Session timeout: ${{ github.event.inputs.session_timeout }} minutes"
          echo "============================================"

      - name: Keep alive until timeout
        run: |
          echo "⏳ Session is active. Will auto-terminate after ${{ github.event.inputs.session_timeout }} minutes."
          echo "   Or cancel the workflow manually when done."
          echo ""
          # Keep the runner alive — sleep in chunks so logs stay updated
          TIMEOUT=$(( ${{ github.event.inputs.session_timeout }} * 60 ))
          ELAPSED=0
          INTERVAL=60
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            REMAINING=$(( (TIMEOUT - ELAPSED) / 60 ))
            echo "⏱️  ${REMAINING} minutes remaining..."
          done
          echo "🛑 Session timed out. Goodbye!"
