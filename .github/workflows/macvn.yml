name: SSH Debug macOS Runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ssh-debug:
    runs-on: macos-latest
    timeout-minutes: 345

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup tmate session
        id: tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          install-dependencies: true
        timeout-minutes: 345

      - name: Write connection info to repo
        if: always()
        run: |
          echo "SSH connection command:" > SSH_CONNECT.txt
          echo "${{ steps.tmate.outputs.connection-string || 'not available' }}" >> SSH_CONNECT.txt
          echo "Generated: $(date -u)" >> SSH_CONNECT.txt
          echo "Run: ${{ github.run_id }}" >> SSH_CONNECT.txt
          git add SSH_CONNECT.txt
          git commit -m "Update SSH connection info [skip ci]" || echo "Nothing to commit"
          git pull --rebase
          git push
