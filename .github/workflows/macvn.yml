name: macOS VNC Testing
on: 
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  vnc-test:
    runs-on: macos-latest
    timeout-minutes: 360 # Max 6 hours
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
    steps:
      - name: Enable Screen Sharing (VNC)
        run: |
          CURRENT_USER=$(whoami)
          echo "Current user: $CURRENT_USER"

          # Set screen resolution to 1920x1080
          brew install screenresolution 2>/dev/null || true
          screenresolution set 1920x1080x32 2>/dev/null || true

          # Try every method to set runner's password
          echo "--- Attempting to set password via sysadminctl ---"
          sudo sysadminctl -resetPasswordFor "$CURRENT_USER" -newPassword tester123 2>&1 || true
          
          echo "--- Attempting to set password via dscl ---"
          sudo dscl . -passwd /Users/$CURRENT_USER "" "tester123" 2>&1 || true
          
          echo "--- Attempting to set password via expect + passwd ---"
          expect << 'EXPECT_EOF' || true
          spawn sudo passwd runner
          expect "New password:"
          send "tester123\r"
          expect "Retype new password:"
          send "tester123\r"
          expect eof
          EXPECT_EOF

          # Grant Screen Recording permission via TCC database
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          for service_id in "com.apple.screensharing" "com.apple.screensharingd" "com.apple.RemoteManagement" "com.apple.remotemanagementd"; do
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture','$service_id',0,2,0,1,0,0);" 2>/dev/null || true
          done
          echo "✅ TCC permissions granted"

          # Enable Remote Management & VNC via kickstart
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw tester123 || true

          # FORCE VNC legacy mode (password-only, no username required)
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCLegacyConnectionsEnabled -bool true
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true
          
          # Restart Screen Sharing to pick up the new settings
          sudo launchctl enable system/com.apple.screensharing
          sudo launchctl kickstart -k system/com.apple.screensharing 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

          # Restart ARD agent to pick up VNC legacy settings
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent || true

          sleep 8

          # Check if VNC is listening
          if sudo lsof -i :5900 > /dev/null 2>&1; then
            echo "✅ VNC server is running on port 5900"
          else
            echo "❌ VNC server failed to start"
            sudo lsof -i -P -sTCP:LISTEN | head -20 || true
            exit 1
          fi

      - name: Setup Python websockify & Download noVNC
        run: |
          pip3 install --break-system-packages websockify

          # Download noVNC (the browser-based VNC client)
          curl -L "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.tar.gz" -o novnc.tar.gz
          tar xzf novnc.tar.gz
          mv noVNC-1.5.0 noVNC

          # Create a simple redirect so opening the root URL goes straight to the VNC viewer
          echo '<html><head><meta http-equiv="refresh" content="0;url=vnc.html?autoconnect=true&resize=remote&password=tester123"></head></html>' > noVNC/index.html

      - name: Install & Configure ngrok
        run: |
          brew install ngrok
          ngrok config add-authtoken $NGROK_AUTH_TOKEN

      - name: Start noVNC & ngrok Tunnel
        run: |
          # Start websockify (bridges browser websockets to VNC on port 5900)
          python3 -m websockify --web=./noVNC 6080 localhost:5900 &
          WEBSOCKIFY_PID=$!
          sleep 3

          # Verify websockify is running
          if lsof -i :6080 > /dev/null 2>&1; then
            echo "✅ websockify is running on port 6080"
          else
            echo "❌ websockify failed to start!"
            exit 1
          fi

          # Start ngrok HTTP tunnel
          ngrok http 6080 --log stdout > ngrok.log 2>&1 &
          NGROK_PID=$!

          # Wait for ngrok to start and grab the URL from its local API
          echo "Waiting for ngrok tunnel..."
          TUNNEL_URL=""
          for i in $(seq 1 20); do
            sleep 2
            TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['tunnels'][0]['public_url'])" 2>/dev/null) || true
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            echo "  Attempt $i/20 - ngrok not ready yet..."
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to start ngrok! Here are the logs:"
            cat ngrok.log 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "======================================================="
          echo "✅ READY TO CONNECT!"
          echo ""
          echo "🌐 Open this URL in your browser:"
          echo "   $TUNNEL_URL"
          echo ""
          echo "   That's it! You'll see the macOS desktop right in"
          echo "   your browser. No extra software needed."
          echo ""
          echo "   👤 Username: runner"
          echo "   🔑 Password: tester123"
          echo "======================================================="

          echo ""
          echo "Keeping the runner alive... (Cancel the workflow manually when done)"
          while true; do sleep 60; done
