name: Linux RDP Testing
on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  rdp-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max 6 hours
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
    steps:
      - name: Install Cinnamon Desktop, VNC server, and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cinnamon-desktop-environment \
            xvfb \
            x11vnc \
            dbus-x11 \
            python3-pip \
            unzip \
            wget

      - name: Start Virtual Display (1920x1080)
        run: |
          Xvfb :1 -screen 0 1920x1080x24 &
          sleep 3
          echo "✅ Xvfb started on display :1"
          echo "DISPLAY=:1" >> $GITHUB_ENV

      - name: Start Cinnamon Session
        run: |
          export DISPLAY=:1
          nohup cinnamon-session > cinnamon-session.log 2>&1 &
          sleep 5
          echo "✅ Cinnamon session started"

      - name: Start x11vnc Server
        run: |
          export DISPLAY=:1
          x11vnc -display :1 -forever -shared -rfbport 5900 -passwd tester123 -bg -o x11vnc.log
          sleep 2

          # Verify x11vnc is running
          if ! pgrep -x "x11vnc" > /dev/null; then
            echo "❌ x11vnc failed to start!"
            cat x11vnc.log
            exit 1
          fi
          echo "✅ x11vnc is running on port 5900"

      - name: Setup Python websockify & Download noVNC
        run: |
          pip3 install websockify

          # Download noVNC (the browser-based VNC client)
          wget -q "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -O novnc.zip
          unzip -q novnc.zip
          mv noVNC-1.5.0 noVNC

          # Create a simple redirect so opening the root URL goes straight to the VNC viewer
          cat > noVNC/index.html << 'EOF'
          <html><head><meta http-equiv="refresh" content="0;url=vnc.html?autoconnect=true&resize=remote&password=tester123"></head></html>
          EOF

      - name: Install & Configure ngrok
        run: |
          wget -q "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz" -O ngrok.tgz
          tar xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken $NGROK_AUTH_TOKEN

      - name: Start noVNC & ngrok Tunnel
        run: |
          # Start websockify (bridges browser websockets to VNC on port 5900)
          nohup python3 -m websockify --web=./noVNC 6080 localhost:5900 > websockify.log 2>&1 &
          sleep 3

          # Verify websockify is running
          if ! ss -tln | grep -q ":6080"; then
            echo "❌ websockify failed to start!"
            cat websockify.log
            exit 1
          fi
          echo "✅ websockify is running on port 6080"

          # Start ngrok HTTP tunnel (free tier supports HTTP, just not TCP)
          nohup ngrok http 6080 --log stdout > ngrok.log 2> ngrok.err &

          # Wait for ngrok to start and grab the URL from its local API
          echo "Waiting for ngrok tunnel..."
          TUNNEL_URL=""
          for i in $(seq 1 20); do
            sleep 2
            RESPONSE=$(curl -s http://localhost:4040/api/tunnels || true)
            TUNNEL_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tunnels'][0]['public_url'])" 2>/dev/null || true)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            echo "  Attempt $i/20 - ngrok not ready yet..."
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to start ngrok! Here are the logs:"
            echo "---- STDOUT ----"
            cat ngrok.log 2>/dev/null || true
            echo "---- STDERR ----"
            cat ngrok.err 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "======================================================="
          echo "✅ READY TO CONNECT!"
          echo ""
          echo "🌐 Open this URL in your browser:"
          echo "   $TUNNEL_URL"
          echo ""
          echo "   That's it! You'll see the Linux (Cinnamon) desktop right in"
          echo "   your browser. No extra software needed."
          echo ""
          echo "   VNC Password (if prompted): tester123"
          echo "======================================================="

          echo ""
          echo "Keeping the runner alive... (Cancel the workflow manually when done)"
          while true; do sleep 60; done
