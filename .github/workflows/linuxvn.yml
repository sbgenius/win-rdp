name: Linux Cinnamon Desktop Testing
on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  cinnamon-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max 6 hours
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install Cinnamon Desktop Environment + VNC server
        run: |
          sudo apt-get update

          # Install Cinnamon desktop. This pulls in a full DE (lightdm etc), so
          # we install noninteractively and then make sure lightdm never
          # auto-starts and fights with our VNC X server.
          sudo apt-get install -y cinnamon-desktop-environment dbus-x11 tigervnc-standalone-server tigervnc-common

          sudo systemctl disable lightdm.service || true
          sudo systemctl stop lightdm.service || true

      - name: Configure VNC (password, resolution, Cinnamon session)
        run: |
          mkdir -p ~/.vnc

          # Set the VNC password (matches the Windows workflow's tester123)
          echo "tester123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          # xstartup: launch a full Cinnamon session inside the VNC X server
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          export XDG_CURRENT_DESKTOP=X-Cinnamon
          export XDG_SESSION_TYPE=x11
          exec dbus-launch --exit-with-session cinnamon-session
          EOF
          chmod +x ~/.vnc/xstartup

      - name: Start VNC server at 1920x1080
        run: |
          vncserver :1 -geometry 1920x1080 -depth 24 -localhost yes

          # Give Cinnamon a few seconds to actually come up
          sleep 8
          vncserver -list

      - name: Setup Python websockify & Download noVNC
        run: |
          sudo apt-get install -y python3-pip
          pip3 install --user websockify

          # Download noVNC (the browser-based VNC client)
          curl -L -o novnc.zip https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip
          unzip -q novnc.zip
          mv noVNC-1.5.0 noVNC

          # Create a simple redirect so opening the root URL goes straight to the VNC viewer
          cat > noVNC/index.html << 'EOF'
          <html><head><meta http-equiv="refresh" content="0;url=vnc.html?autoconnect=true&resize=remote&password=tester123"></head></html>
          EOF

      - name: Install & Configure ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update
          sudo apt-get install -y ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Start noVNC & ngrok Tunnel
        run: |
          # Start websockify (bridges browser websockets to VNC on port 5900)
          nohup ~/.local/bin/websockify --web=./noVNC 6080 localhost:5901 \
            > websockify.log 2>&1 &
          sleep 3

          # Verify websockify is running
          if ! ss -tln | grep -q ':6080 '; then
            echo "❌ websockify failed to start!"
            cat websockify.log
            exit 1
          fi
          echo "✅ websockify is running on port 6080"

          # Start ngrok HTTP tunnel (free tier supports HTTP, just not TCP)
          nohup ngrok http 6080 --log stdout > ngrok.log 2> ngrok.err &

          # Wait for ngrok to start and grab the URL from its local API
          echo "Waiting for ngrok tunnel..."
          tunnel_url=""
          for i in $(seq 1 20); do
            sleep 2
            tunnel_url=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['tunnels'][0]['public_url'])" 2>/dev/null || true)
            if [ -n "$tunnel_url" ]; then
              break
            fi
            echo "  Attempt $i/20 - ngrok not ready yet..."
          done

          if [ -z "$tunnel_url" ]; then
            echo "❌ Failed to start ngrok! Here are the logs:"
            echo "---- STDOUT ----"
            [ -f ngrok.log ] && cat ngrok.log
            echo "---- STDERR ----"
            [ -f ngrok.err ] && cat ngrok.err
            exit 1
          fi

          echo ""
          echo "======================================================="
          echo "✅ READY TO CONNECT!"
          echo ""
          echo "🌐 Open this URL in your browser:"
          echo "   $tunnel_url"
          echo ""
          echo "   That's it! You'll see the Linux Cinnamon desktop right"
          echo "   in your browser. No extra software needed."
          echo ""
          echo "   VNC Password (if prompted): tester123"
          echo "======================================================="

          echo ""
          echo "Keeping the runner alive... (Cancel the workflow manually when done)"
          while true; do sleep 60; done
